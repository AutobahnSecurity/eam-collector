server:
  url: https://eam.your-company.com
  api_key: ek_your-api-key-here

# Collection interval in seconds (minimum 10)
interval: 60

# Only read sessions modified within this window (hours). Default: 24
# Set to 1-2 for "active sessions only" mode
lookback: 24

parsers:
  claude_code:
    enabled: true
  cursor:
    enabled: true
  copilot:
    enabled: true
  continuedev:
    enabled: true
