server:
  url: https://eam.devops.atbhn.io
  api_key: ek_YOUR_API_KEY_HERE

# Collection interval in seconds (minimum 10)
interval: 60

# Only read sessions modified within this window (hours). Default: 24
# Set to 1-2 for "active sessions only" mode
lookback: 24

parsers:
  claude:
    enabled: true
  cursor:
    enabled: true
  copilot:
    enabled: true
  continuedev:
    enabled: true
  opencode:
    enabled: true
  codex:
    enabled: true
